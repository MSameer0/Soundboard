<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SoundBoard</title>
    <link rel="stylesheet" href="/src/styles.css" />
    <script type="module" src="/src/main.ts" defer></script>
  </head>

  <body>
    <div id="app">
      <header data-tauri-drag-region class="titlebar">
        <span class="title">SoundBoard</span>
        <div class="window-controls">
          <button id="minimize" class="control-btn yellow" title="Minimize"></button>
          <button id="close" class="control-btn red" title="Close"></button>
        </div>
      </header>
      
      <main id="sound-grid" class="scrollable-content">
        <!-- Sound cards will be dynamically inserted here -->
      </main>
    </div>
  </body>
</html>
